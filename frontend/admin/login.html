<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebGuard — Admin Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/login.css">
</head>
<body class="login-body">

  <div class="login-wrap">
    <form class="login-card" id="loginForm">

      <div class="login-head">
        <div>
          <h1>Login Your <span>Account</span></h1>
          <p>Join WebGuard and browse the web with confidence.</p>
        </div>
        <span class="login-shield">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M12 3l7 3v5c0 5-3.2 8.2-7 10-3.8-1.8-7-5-7-10V6l7-3z"/>
            <path d="M9 12l2 2 4-4"/>
          </svg>
        </span>
      </div>

      <div class="login-field">
        <span class="field-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
            <rect x="3" y="5" width="18" height="14" rx="2.5"/>
            <path d="M3.5 6.5L12 13l8.5-6.5"/>
          </svg>
        </span>
        <input type="email" id="email" name="email" placeholder="Email" autocomplete="email" required>
      </div>

      <div class="login-field">
        <span class="field-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
            <rect x="5" y="11" width="14" height="9" rx="2"/>
            <path d="M8 11V8a4 4 0 018 0v3"/>
          </svg>
        </span>
        <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password" required>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">Login</button>

    </form>
  </div>

<script src="../js/api.js"></script>
<script src="../js/login.js"></script>

</body>
</html>
