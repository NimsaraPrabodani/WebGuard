<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebGuard</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>

  <div class="app">

    <div class="header">
      <svg class="shield" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L4 5V11C4 16.5 7.4 21.2 12 22C16.6 21.2 20 16.5 20 11V5L12 2Z" fill="#22c55e"/>
        <path d="M9.5 12L11 13.5L14.5 10" stroke="#0b0e14" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="header-text">
        <h1>WebGuard</h1>
        <p>Phishing Detection System</p>
      </div>
    </div>

    <!-- SCREEN 1: URL + Check button -->
    <div class="screen" id="checkScreen">

      <div class="url-row">
        <svg class="globe" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/>
          <path d="M3 12H21" stroke="currentColor" stroke-width="1.6"/>
          <path d="M12 3C14.5 5.5 15.8 8.6 15.8 12C15.8 15.4 14.5 18.5 12 21C9.5 18.5 8.2 15.4 8.2 12C8.2 8.6 9.5 5.5 12 3Z" stroke="currentColor" stroke-width="1.6"/>
        </svg>
        <span class="url-text" id="urlText">Loading current tab…</span>
      </div>

      <button class="btn" id="checkBtn">Check Website</button>

    </div>

    <!-- SCREEN 2: Result box + View Score button -->
    <div class="screen hidden" id="resultScreen">

      <div class="result-box" id="resultBox">
        <div class="spinner" id="spinner"></div>
      </div>

      <button class="btn" id="viewScoreBtn">View Score</button>

      <div class="details hidden" id="details"></div>

    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
